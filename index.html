<!DOCTYPE html>
<html>
<head>
    <title>ForenChain - Evidence System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>🔐 ForenChain Evidence Management</h1>

    <div class="card">
        <h2>Upload Evidence</h2>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>
    </div>

    <div class="card">
        <h2>Verify Evidence</h2>
        <form action="/verify" method="POST" enctype="multipart/form-data">
            <input type="number" name="index" placeholder="Evidence Index" required>
            <input type="file" name="file" required>
            <button type="submit">Verify</button>
        </form>
    </div>

    <a href="/dashboard" class="link-btn">View Dashboard</a>
</div>

</body>
</html>

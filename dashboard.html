<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📊 Evidence Dashboard</h1>

    <div class="card">
        <p>Total Evidence Stored: {{ total }}</p>

    </div>
    
<table border="1">
<tr>
<th>Index</th>
<th>File Name</th>
<th>Hash</th>
<th>Timestamp</th>
</tr>

{% for e in evidences %}
<tr>
<td>{{ loop.index0 }}</td>
<td>{{ e[1] }}</td>
<td>{{ e[0] }}</td>
<td>{{ e[2] }}</td>
</tr>
{% endfor %}

</table>


    <a href="/" class="link-btn">⬅ Back</a>
</div>

</body>
</html>
